version: '3.8'

services:
  zookeeper:
    image: 'zookeeper:3.8'
    container_name: zookeeper
    ports:
      - '2181:2181'

  kafka:
    image: 'bitnami/kafka:3.4'
    container_name: kafka
    ports:
      - '9092:9092'
      - '29092:29092'
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,EXTERNAL://:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
    depends_on:
      - zookeeper

  postgres:
    image: 'postgres:15'
    container_name: postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=crime_db
    volumes:
      - ../db/postgres_init.sql:/docker-entrypoint-initdb.d/init.sql

  mongo:
    image: 'mongo:6'
    container_name: mongo
    ports:
      - '27017:27017'

  spark:
    image: 'bitnami/spark:3.4'
    container_name: spark
    ports:
      - '8080:8080'
      - '7077:7077'
    environment:
      - SPARK_MODE=master
    volumes:
      - ../data:/data
      - ../spark:/opt/spark-apps

  nimbus:
    image: 'storm:2.5.0'
    container_name: nimbus
    command: storm nimbus
    depends_on:
      - zookeeper
    ports:
      - '6627:6627'

  supervisor:
    image: 'storm:2.5.0'
    container_name: supervisor
    command: storm supervisor
    depends_on:
      - nimbus
      - zookeeper

  storm-ui:
    image: 'storm:2.5.0'
    container_name: storm-ui
    command: storm ui
    depends_on:
      - nimbus
    ports:
      - '8081:8080'

  # A python runner container that mounts our local directory to run scripts easily
  runner:
    build: .
    container_name: runner
    volumes:
      - ../:/app
    tty: true
    depends_on:
      - kafka
      - postgres
      - mongo
